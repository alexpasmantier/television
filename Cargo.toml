[package]
name = "television"
version = "0.1.0"
edition = "2021"
authors = ["Alexandre Pasmantier <alex.pasmant@gmail.com>"]
license = "Apache-2.0"
description = "An interactive fuzzy finder for your terminal."
readme = "README.md"
homepage = "https://github.com/alexpasmantier/television"
repository = "https://github.com/alexpasmantier/television"
keywords = ["search", "fuzzy", "preview", "tui", "terminal"]
categories = [
  "command-line-utilities",
  "command-line-interface",
  "concurrency",
  "development-tools",
]

[dependencies]
anyhow = "1.0.86"
clap = { version = "4.5.9", features = ["derive"] }
crossbeam = { version = "0.8.4", features = ["crossbeam-queue"] }
devicons = "0.1.0"
directories = "5.0.1"
grep = "0.3.1"
ignore = "0.4.22"
lazy_static = "1.5.0"
ratatui = "0.28.1"
serde = { version = "1.0.204", features = ["derive"] }
serde_json = "1.0.120"
strsim = "0.11.1"
syntect = "5.2.0"
syntect-tui = "3.0.3"
termcolor = "1.4.1"
tracing = "0.1.40"
tracing-error = "0.2.0"
tracing-subscriber = { version = "0.3.18", features = ["env-filter"] }
unicode-width = "0.1.13"

[[bin]]
name = "tv"
path = "src/main.rs"

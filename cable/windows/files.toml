[metadata]
name = "files"
description = "A channel to select files and directories"
requirements = ["fd", "bat"]

[source]
command = [
  { name = "Default", run = "fd -t f" },
  { name = "Hidden",  run = "fd -t f -H" },
]

[preview]
command = "bat -n --color=always -- '{}'"
env = { BAT_THEME = "ansi" }

[keybindings]
shortcut = "f1"
